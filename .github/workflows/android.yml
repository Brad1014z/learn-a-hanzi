# CI (docs/specs/01): unit tests gate the APK — if the engine suite (including the
# grading golden corpus) fails, no APK is produced.
name: android

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Test & build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Matches gradle/gradle-daemon-jvm.properties so the daemon finds this JDK
      # instead of downloading another one.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (engine + app)
        run: ./gradlew test --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload test APK
        uses: actions/upload-artifact@v4
        with:
          name: hanzi-prototype-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
